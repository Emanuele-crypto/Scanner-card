<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Clienti — Simone Gatto S.r.l.</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f2ee;
    --surface: #ffffff;
    --border: #d6d1c7;
    --accent: #1a5c3a;
    --accent-light: #e8f0eb;
    --text: #1c1c1c;
    --text-muted: #6b6560;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --danger: #c0392b;
    --row-even: #fafaf8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 3px solid #0f3d26;
  }

  header .logo-mark {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    background: rgba(255,255,255,0.15);
    padding: 6px 12px;
    border-radius: 4px;
    letter-spacing: 0.05em;
  }

  header h1 {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  header .count-badge {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 13px;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 20px;
  }

  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    min-height: calc(100vh - 65px);
  }

  /* ---- FORM PANEL ---- */
  .form-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    overflow-y: auto;
  }

  .form-panel h2 {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .field-group {
    margin-bottom: 14px;
  }

  .field-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 5px;
  }

  .field-group input,
  .field-group select,
  .field-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--sans);
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
    outline: none;
  }

  .field-group input:focus,
  .field-group select:focus,
  .field-group textarea:focus {
    border-color: var(--accent);
    background: white;
  }

  .field-group textarea {
    resize: vertical;
    min-height: 60px;
    font-size: 13px;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .section-divider {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin: 20px 0 14px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--accent);
  }

  .btn-primary {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 18px;
    transition: background 0.15s, transform 0.1s;
  }

  .btn-primary:hover { background: #0f3d26; }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    width: 100%;
    padding: 9px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    margin-top: 8px;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: white;
    padding: 10px 20px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 13px;
    transition: transform 0.3s ease;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ---- TABLE PANEL ---- */
  .table-panel {
    padding: 24px 28px;
    overflow-x: auto;
  }

  .table-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .table-toolbar h2 {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
  }

  .search-box {
    margin-left: auto;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--sans);
    font-size: 13px;
    background: white;
    width: 220px;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }

  .btn-export {
    padding: 7px 16px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    color: var(--accent);
    transition: background 0.15s;
  }
  .btn-export:hover { background: var(--accent-light); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    background: white;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  thead tr {
    background: var(--accent);
    color: white;
  }

  thead th {
    padding: 10px 14px;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }

  thead th:hover { background: #0f3d26; }

  tbody tr:nth-child(even) { background: var(--row-even); }
  tbody tr:hover { background: var(--accent-light); }

  tbody td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  tbody td.mono-cell {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .tag-settore {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid #b5d4bf;
  }

  .btn-del {
    background: none;
    border: none;
    color: #bbb;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.15s, background 0.15s;
  }
  .btn-del:hover { color: var(--danger); background: #fdecea; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Edit modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 8px;
    padding: 28px;
    width: 420px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .modal h3 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .modal-footer {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .modal-footer .btn-primary { margin: 0; flex: 1; }
  .modal-footer .btn-cancel {
    padding: 11px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    color: var(--text-muted);
  }
  .modal-footer .btn-cancel:hover { border-color: var(--text-muted); }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .form-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">SG</div>
  <h1>Registro Clienti</h1>
  <div class="count-badge" id="headerCount">0 contatti</div>
</header>

<div class="layout">

  <!-- FORM -->
  <div class="form-panel">
    <h2>Nuovo Contatto</h2>

    <div class="section-divider">Anagrafica</div>

    <div class="field-group">
      <label>Ragione Sociale *</label>
      <input type="text" id="f_ragione" placeholder="es. Rossi S.r.l.">
    </div>
    <div class="field-row">
      <div class="field-group">
        <label>Referente</label>
        <input type="text" id="f_referente" placeholder="Nome Cognome">
      </div>
      <div class="field-group">
        <label>Ruolo</label>
        <input type="text" id="f_ruolo" placeholder="es. Direttore">
      </div>
    </div>
    <div class="field-group">
      <label>Settore</label>
      <select id="f_settore">
        <option value="">— seleziona —</option>
        <option>Agrumario</option>
        <option>Alimentare</option>
        <option>Chimico</option>
        <option>Farmaceutico</option>
        <option>Petrolchimico</option>
        <option>Logistica</option>
        <option>Manutenzione</option>
        <option>Altro</option>
      </select>
    </div>

    <div class="section-divider">Sede</div>

    <div class="field-group">
      <label>Indirizzo</label>
      <input type="text" id="f_indirizzo" placeholder="Via/Contrada, numero">
    </div>
    <div class="field-row">
      <div class="field-group">
        <label>CAP</label>
        <input type="text" id="f_cap" placeholder="es. 98045" maxlength="5">
      </div>
      <div class="field-group">
        <label>Città (Prov.)</label>
        <input type="text" id="f_citta" placeholder="es. Messina (ME)">
      </div>
    </div>

    <div class="section-divider">Contatti</div>

    <div class="field-row">
      <div class="field-group">
        <label>Telefono</label>
        <input type="text" id="f_tel" placeholder="+39 090 ...">
      </div>
      <div class="field-group">
        <label>Fax</label>
        <input type="text" id="f_fax" placeholder="+39 090 ...">
      </div>
    </div>
    <div class="field-group">
      <label>Email</label>
      <input type="email" id="f_email" placeholder="info@azienda.com">
    </div>
    <div class="field-group">
      <label>PEC</label>
      <input type="email" id="f_pec" placeholder="azienda@pec.it">
    </div>

    <div class="section-divider">Dati Fiscali</div>

    <div class="field-row">
      <div class="field-group">
        <label>Partita IVA</label>
        <input type="text" id="f_piva" placeholder="IT01777...">
      </div>
      <div class="field-group">
        <label>Cod. Destinatario</label>
        <input type="text" id="f_sdi" placeholder="A4707H7" maxlength="7">
      </div>
    </div>

    <div class="section-divider">Note</div>

    <div class="field-group">
      <textarea id="f_note" placeholder="Note libere, prodotti, accordi..."></textarea>
    </div>

    <button class="btn-primary" onclick="addContact()">+ Aggiungi Contatto</button>
    <button class="btn-secondary" onclick="clearForm()">Pulisci Form</button>
  </div>

  <!-- TABLE -->
  <div class="table-panel">
    <div class="table-toolbar">
      <h2>Contatti Censiti</h2>
      <input class="search-box" type="text" placeholder="Cerca..." oninput="renderTable(this.value)">
      <button class="btn-export" onclick="exportCSV()">↓ CSV</button>
    </div>

    <div id="tableContainer">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>Nessun contatto inserito</p>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Modifica Contatto</h3>
    <div id="modalFields"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Annulla</button>
      <button class="btn-primary" onclick="saveEdit()">Salva</button>
    </div>
  </div>
</div>

<script>
let contacts = JSON.parse(localStorage.getItem('sg_contacts') || '[]');
let editIndex = -1;

const FIELDS = [
  { id: 'ragione', label: 'Ragione Sociale', req: true },
  { id: 'referente', label: 'Referente' },
  { id: 'ruolo', label: 'Ruolo' },
  { id: 'settore', label: 'Settore', type: 'select', opts: ['','Agrumario','Alimentare','Chimico','Farmaceutico','Petrolchimico','Logistica','Manutenzione','Altro'] },
  { id: 'indirizzo', label: 'Indirizzo' },
  { id: 'cap', label: 'CAP' },
  { id: 'citta', label: 'Città (Prov.)' },
  { id: 'tel', label: 'Telefono' },
  { id: 'fax', label: 'Fax' },
  { id: 'email', label: 'Email' },
  { id: 'pec', label: 'PEC' },
  { id: 'piva', label: 'Partita IVA' },
  { id: 'sdi', label: 'Cod. Destinatario' },
  { id: 'note', label: 'Note', type: 'textarea' },
];

function getFormData() {
  const data = {};
  FIELDS.forEach(f => {
    const el = document.getElementById('f_' + f.id);
    data[f.id] = el ? el.value.trim() : '';
  });
  return data;
}

function addContact() {
  const data = getFormData();
  if (!data.ragione) { showToast('⚠ Ragione Sociale obbligatoria'); return; }
  data.id = Date.now();
  data.dataInserimento = new Date().toLocaleDateString('it-IT');
  contacts.unshift(data);
  save();
  renderTable();
  clearForm();
  showToast('✓ Contatto aggiunto');
}

function clearForm() {
  FIELDS.forEach(f => {
    const el = document.getElementById('f_' + f.id);
    if (el) el.value = '';
  });
}

function deleteContact(i) {
  if (!confirm('Eliminare questo contatto?')) return;
  contacts.splice(i, 1);
  save();
  renderTable();
  showToast('Contatto eliminato');
}

function openEdit(i) {
  editIndex = i;
  const c = contacts[i];
  const container = document.getElementById('modalFields');
  container.innerHTML = FIELDS.map(f => {
    const val = c[f.id] || '';
    if (f.type === 'select') {
      const opts = f.opts.map(o => `<option${o===val?' selected':''}>${o}</option>`).join('');
      return `<div class="field-group"><label>${f.label}</label><select id="m_${f.id}">${opts}</select></div>`;
    }
    if (f.type === 'textarea') {
      return `<div class="field-group"><label>${f.label}</label><textarea id="m_${f.id}">${val}</textarea></div>`;
    }
    return `<div class="field-group"><label>${f.label}</label><input type="text" id="m_${f.id}" value="${val.replace(/"/g,'&quot;')}"></div>`;
  }).join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function saveEdit() {
  const c = contacts[editIndex];
  FIELDS.forEach(f => {
    const el = document.getElementById('m_' + f.id);
    if (el) c[f.id] = el.value.trim();
  });
  save();
  renderTable();
  closeModal();
  showToast('✓ Contatto aggiornato');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editIndex = -1;
}

function save() {
  localStorage.setItem('sg_contacts', JSON.stringify(contacts));
  document.getElementById('headerCount').textContent = contacts.length + (contacts.length === 1 ? ' contatto' : ' contatti');
}

function renderTable(q = '') {
  const query = q.toLowerCase();
  const filtered = contacts.map((c, i) => ({ c, i })).filter(({ c }) =>
    !query || Object.values(c).some(v => String(v).toLowerCase().includes(query))
  );

  document.getElementById('headerCount').textContent = contacts.length + (contacts.length === 1 ? ' contatto' : ' contatti');

  if (filtered.length === 0) {
    document.getElementById('tableContainer').innerHTML = `
      <div class="empty-state">
        <div class="icon">${contacts.length === 0 ? '📋' : '🔍'}</div>
        <p>${contacts.length === 0 ? 'Nessun contatto inserito' : 'Nessun risultato per "' + q + '"'}</p>
      </div>`;
    return;
  }

  const rows = filtered.map(({ c, i }) => `
    <tr>
      <td><strong>${c.ragione || '—'}</strong></td>
      <td>${c.referente || '—'}</td>
      <td>${c.settore ? `<span class="tag-settore">${c.settore}</span>` : '—'}</td>
      <td>${c.citta || '—'}</td>
      <td class="mono-cell">${c.tel || '—'}</td>
      <td>${c.email ? `<a href="mailto:${c.email}" style="color:var(--accent)">${c.email}</a>` : '—'}</td>
      <td class="mono-cell">${c.piva || '—'}</td>
      <td class="mono-cell">${c.sdi || '—'}</td>
      <td style="white-space:nowrap">
        <button class="btn-del" onclick="openEdit(${i})" title="Modifica">✏️</button>
        <button class="btn-del" onclick="deleteContact(${i})" title="Elimina">🗑</button>
      </td>
    </tr>`).join('');

  document.getElementById('tableContainer').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Ragione Sociale</th>
          <th>Referente</th>
          <th>Settore</th>
          <th>Città</th>
          <th>Telefono</th>
          <th>Email</th>
          <th>P.IVA</th>
          <th>SDI</th>
          <th></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function exportCSV() {
  if (contacts.length === 0) { showToast('Nessun dato da esportare'); return; }
  const headers = ['Ragione Sociale','Referente','Ruolo','Settore','Indirizzo','CAP','Città','Telefono','Fax','Email','PEC','Partita IVA','Cod.Dest.','Note','Data Inserimento'];
  const keys = ['ragione','referente','ruolo','settore','indirizzo','cap','citta','tel','fax','email','pec','piva','sdi','note','dataInserimento'];
  const csv = [headers.join(';'), ...contacts.map(c => keys.map(k => `"${(c[k]||'').replace(/"/g,'""')}"`).join(';'))].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'clienti_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  showToast('✓ CSV esportato');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Init
renderTable();
</script>
</body>
</html>
